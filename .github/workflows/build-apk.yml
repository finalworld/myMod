name: Bygg Bubbsun v0.320 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Installera Gradle 8.9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Kontrollera projektfiler
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts

      - name: Bygg debug-APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.320-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
