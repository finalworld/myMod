name: Bygg Bubbsun v0.321 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Hitta Android-projektet
        shell: bash
        run: |
          set -e

          SETTINGS_FILE="$(find . -type f -name 'settings.gradle.kts' -print -quit)"

          if [ -z "$SETTINGS_FILE" ]; then
            SETTINGS_FILE="$(find . -type f -name 'settings.gradle' -print -quit)"
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "FEL: Kunde inte hitta settings.gradle.kts eller settings.gradle."
            echo "Filer som finns i repot:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android-projektet hittades i: $PROJECT_DIR"

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Installera Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Kontrollera appmodulen
        shell: bash
        run: |
          if [ ! -f "$PROJECT_DIR/app/build.gradle.kts" ] && [ ! -f "$PROJECT_DIR/app/build.gradle" ]; then
            echo "FEL: app/build.gradle.kts eller app/build.gradle saknas."
            echo "Innehåll i projektmappen:"
            find "$PROJECT_DIR" -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "Appmodulen hittades."

      - name: Bygg debug-APK
        shell: bash
        run: |
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
            cd "$PROJECT_DIR"
            ./gradlew :app:assembleDebug --stacktrace
          else
            gradle -p "$PROJECT_DIR" :app:assembleDebug --stacktrace
          fi

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.321-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
