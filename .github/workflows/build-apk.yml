name: Bygg Bubbsun v0.330 APK


on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Hitta eller packa upp projektet
        shell: bash
        run: |
          set -e
          SETTINGS_FILE=$(find . -type f \( -name 'settings.gradle.kts' -o -name 'settings.gradle' \) -not -path './.git/*' -print -quit)

          if [ -z "$SETTINGS_FILE" ]; then
            ZIP_FILE=$(find . -maxdepth 2 -type f -iname 'Bubbsun*.zip' -print -quit)
            [ -n "$ZIP_FILE" ] || ZIP_FILE=$(find . -maxdepth 2 -type f -iname '*.zip' -print -quit)

            [ -n "$ZIP_FILE" ] || {
              echo 'FEL: Android-projekt eller ZIP saknas.'
              exit 1
            }

            rm -rf extracted-project
            mkdir extracted-project
            unzip -q "$ZIP_FILE" -d extracted-project

            SETTINGS_FILE=$(find extracted-project -type f \( -name 'settings.gradle.kts' -o -name 'settings.gradle' \) -print -quit)
          fi

          [ -n "$SETTINGS_FILE" ] || {
            echo 'FEL: settings.gradle saknas.'
            exit 1
          }

          echo "PROJECT_DIR=$(dirname "$SETTINGS_FILE")" >> "$GITHUB_ENV"

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Installera Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Bygg signerad release-APK
        shell: bash
        run: |
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
            cd "$PROJECT_DIR"
            ./gradlew :app:assembleRelease --stacktrace
          else
            gradle -p "$PROJECT_DIR" :app:assembleRelease --stacktrace
          fi

      - name: Döp APK
        shell: bash
        run: |
          APK=$(find "$PROJECT_DIR/app/build/outputs/apk/release" -name '*.apk' -print -quit)
          cp "$APK" "$PROJECT_DIR/app/build/outputs/apk/release/Bubbsun-v0.330.apk"

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.330-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/Bubbsun-v0.330.apk
          if-no-files-found: error
