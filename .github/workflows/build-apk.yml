name: Bygg Bubbsun APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta filer
        uses: actions/checkout@v4

      - name: Packa upp Bubbsun
        run: unzip Bubbsun_v0.04_GitHub_ready.zip -d bubbsun

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installera Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Bygg APK
        working-directory: bubbsun
        run: gradle assembleDebug --stacktrace

      - name: Spara APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-APK
          path: bubbsun/app/build/outputs/apk/debug/app-debug.apk
