name: Bygg Bubbsun v0.320 APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Hitta eller packa upp Android-projektet
        shell: bash
        run: |
          set -e

          SETTINGS_FILE=$(find . -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) -print -quit)

          if [ -z "$SETTINGS_FILE" ]; then
            ZIP_FILE=$(find . -maxdepth 3 -type f -iname "*.zip" -print -quit)
            if [ -n "$ZIP_FILE" ]; then
              echo "Hittade ZIP: $ZIP_FILE"
              mkdir -p extracted-project
              unzip -q "$ZIP_FILE" -d extracted-project
              SETTINGS_FILE=$(find extracted-project -type f \( -name "settings.gradle.kts" -o -name "settings.gradle" \) -print -quit)
            fi
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "FEL: Ingen settings.gradle.kts eller settings.gradle hittades."
            echo "Lägg upp hela projektets innehåll i repot, inte bara workflow-filen."
            echo "Filer som finns i repot:"
            find . -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android-projektet finns i: $PROJECT_DIR"

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Installera Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Kontrollera projektet
        shell: bash
        run: |
          test -f "$PROJECT_DIR/app/build.gradle.kts" -o -f "$PROJECT_DIR/app/build.gradle"
          echo "Projektkontrollen lyckades."

      - name: Bygg debug-APK
        shell: bash
        run: |
          if [ -f "$PROJECT_DIR/gradlew" ]; then
            chmod +x "$PROJECT_DIR/gradlew"
            "$PROJECT_DIR/gradlew" -p "$PROJECT_DIR" :app:assembleDebug --stacktrace
          else
            gradle -p "$PROJECT_DIR" :app:assembleDebug --stacktrace
          fi

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.320-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
