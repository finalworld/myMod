name: Bygg Bubbsun v0.321 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Packa upp projektet
        shell: bash
        run: |
          set -e

          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "FEL: Ingen ZIP-fil hittades i repot."
            exit 1
          fi

          echo "Hittade ZIP-fil: $ZIP_FILE"

          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted

          SETTINGS_FILE=$(find extracted -type f -name "settings.gradle.kts" | head -n 1)

          if [ -z "$SETTINGS_FILE" ]; then
            SETTINGS_FILE=$(find extracted -type f -name "settings.gradle" | head -n 1)
          fi

          if [ -z "$SETTINGS_FILE" ]; then
            echo "FEL: Android-projektet saknas i ZIP-filen."
            echo "Filer i ZIP-filen:"
            find extracted -maxdepth 5 -type f | sort
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android-projekt hittat i: $PROJECT_DIR"

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Installera Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Kontrollera appmodulen
        shell: bash
        run: |
          if [ ! -f "$PROJECT_DIR/app/build.gradle.kts" ] && [ ! -f "$PROJECT_DIR/app/build.gradle" ]; then
            echo "FEL: app/build.gradle saknas."
            find "$PROJECT_DIR" -maxdepth 4 -type f | sort
            exit 1
          fi

          echo "Appmodulen hittades."

      - name: Bygg debug-APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew :app:assembleDebug --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.321-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
