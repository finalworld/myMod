name: Build Bubbsun APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Installera Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installera Android SDK
        uses: android-actions/setup-android@v3

      - name: Installera Android 35
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Installera Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Hitta projektmappen
        id: find
        run: |
          DIR=$(find . -name settings.gradle -o -name settings.gradle.kts | head -n1 | xargs dirname)
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Projektmapp: $DIR"

      - name: Bygg debug-APK
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          chmod +x gradlew || true
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      - name: Ladda upp APK
        uses: actions/upload-artifact@v4
        with:
          name: Bubbsun-v0.320-APK
          path: |
            ${{ steps.find.outputs.dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.find.outputs.dir }}/**/build/outputs/apk/debug/*.apk
